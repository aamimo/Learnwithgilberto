<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Details | Learnwithgilberto</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="lesson-header">
        <a href="index.html" class="back-btn">← Back to Home</a>
    </header>

    <article class="single-lesson" id="lessonContainer">
        <!-- This content will be filled automatically by JavaScript -->
        <div class="loading">Loading lesson...</div>
    </article>

    <footer>
        <p>Stay connected with Learnwithgilberto</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Get the ID of the lesson from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = parseInt(urlParams.get('id'));

            // 2. Fetch the Master List
            fetch('./lessons.json')
                .then(response => response.json())
                .then(lessons => {
                    // 3. Find the specific lesson that matches the ID
                    const lesson = lessons.find(l => l.id === lessonId);

                    if (lesson) {
                        renderLesson(lesson);
                    } else {
                        document.getElementById('lessonContainer').innerHTML = "<h1>Lesson not found</h1>";
                    }
                });

            function renderLesson(data) {
                const container = document.getElementById('lessonContainer');
                container.innerHTML = `
                    <div class="lesson-hero" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${data.image}');">
                        <div class="hero-text">
                            <span class="category-tag">${data.category}</span>
                            <h1>${data.title}</h1>
                        </div>
                    </div>

                    <div class="lesson-body">
                        <section class="scripture-box">
                            <blockquote>
                                "${data.scripture}"
                            </blockquote>
                        </section>

                        <div class="content-text">
                            ${data.content}
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
